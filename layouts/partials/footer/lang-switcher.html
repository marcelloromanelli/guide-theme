<footer class="w-full text-center border-t border-gray-200 p-4 pin-b text-black">
    {{ range .AllTranslations }}
        {{ if eq .Language.Lang $.Language.Lang }}
            <span class="mr-3" aria-current="true">{{ .Language.Label }}</span>
        {{ else }}
            <a class="mr-3" href="{{ .Permalink }}">{{ .Language.Label }}</a>
        {{ end }}
    {{ end }}
</footer>
