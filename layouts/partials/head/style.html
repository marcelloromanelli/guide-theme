<link rel="preload" as="font" type="font/woff2" href="{{ "/fonts/archivo-var.woff2" | relURL }}" crossorigin>
{{ if hugo.IsServer }}
    {{ $style := resources.Get "css/ygb.css" | fingerprint }}
    <link rel="stylesheet" href="{{ $style.Permalink }}">
{{ else }}
    {{ $style := resources.Get "css/ygb.css" | minify | fingerprint }}
    <link rel="stylesheet" href="{{ $style.Permalink }}" integrity="{{ $style.Data.Integrity }}">
{{ end }}
