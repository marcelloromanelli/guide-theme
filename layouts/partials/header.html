<div class="ygb-header">
    <div class="ygb-strip ygb-strip--thin"><i></i><i></i><i></i><i></i><i></i><i></i></div>
    <div class="ygb-header-bar">
        <div class="ygb-header-inner">
            <nav class="ygb-nav">
                <a href="{{ .Site.Home.Permalink }}" style="text-decoration:none">
                    {{- partial "logo.html" (dict "variant" "navy" "size" "md") -}}
                </a>
                <input id="nav-toggle" type="checkbox" class="ygb-nav-toggle">
                <label for="nav-toggle" class="ygb-menu-btn" aria-label="Menu">
                    <svg class="ico-open" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><title>Menu</title><line x1="4" x2="20" y1="6" y2="6"></line><line x1="4" x2="20" y1="12" y2="12"></line><line x1="4" x2="20" y1="18" y2="18"></line></svg>
                    <svg class="ico-close" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><title>Close</title><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
                </label>
                <ul class="ygb-menu">
                {{ range .Site.Menus.main }}
                    <li><a href="{{ .URL | absURL }}">{{ .Name }}</a></li>
                {{ end }}
                </ul>
            </nav>
            {{- partial "breadcrumbs.html" . -}}
        </div>
    </div>
</div>
