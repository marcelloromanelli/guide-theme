{{ $related := .Site.RegularPages.Related . | first 4 }}
{{ with $related }}
<div class="ygb-related">
    <h3>{{ i18n "keepReading" | default "Keep reading" }}</h3>
    <div class="ygb-related-grid">
        {{ range . }}
        <a href="{{ .Permalink }}">
            <h4>{{ .Title | markdownify }}</h4>
            <p>{{ .Summary | truncate 100 | plainify | htmlUnescape }}</p>
            <span class="rl-meta">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                {{ i18n "readingTime" .ReadingTime }}
            </span>
        </a>
        {{ end }}
    </div>
</div>
{{ end }}
