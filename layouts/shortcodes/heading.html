{{ $level := .Get 0 | default "2" }}
{{ $text := .Get 1 }}
{{ $id := .Get 2 | default (anchorize $text) }}

{{ printf "<%s id=\"%s\" class=\"group relative\">" (printf "h%s" $level) $id | safeHTML }}
    {{ $text | markdownify }}
    <a href="#{{ $id }}" class="absolute left-0 top-0 ml-[-1.5rem] opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-800 transition-opacity" aria-label="Link to {{ $text }}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path>
        </svg>
    </a>
{{ printf "</%s>" (printf "h%s" $level) | safeHTML }}
