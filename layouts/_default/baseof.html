<!DOCTYPE html>
<html lang='{{ .Site.Language.Lang }}'>

    <body>
        {{- partial "dev-size-indicator.html" . -}}
        {{- partial "header.html" . -}}
        {{- partial "header-image.html" . -}}

        {{- partial "footer.html" . -}}

</html>
