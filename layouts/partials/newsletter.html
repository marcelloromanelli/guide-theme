<section class="ygb-newsletter">
    <div class="ygb-newsletter-inner">
        <div class="ygb-newsletter-copy">
            <h2>
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>
                {{ i18n "newsletterTitle" | default "Get the local's letter" }}
            </h2>
            <p>{{ i18n "newsletterBlurb" | default "One email a month — new guides, seasonal tips, zero spam. Written by Sam, from Barcelona." }}</p>
        </div>
        {{/* TODO: point action at your newsletter provider (Buttondown/Mailchimp/etc.) */}}
        <form action="#" method="post">
            <input type="email" name="email" required placeholder="{{ i18n "newsletterPlaceholder" | default "you@example.com" }}" aria-label="Email">
            <button type="submit" class="ygb-btn ygb-btn--dark">
                {{ i18n "newsletterCta" | default "Subscribe" }}
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
            </button>
        </form>
    </div>
</section>
