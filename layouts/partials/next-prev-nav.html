{{ if or .NextInSection .PrevInSection }}
<nav class="ygb-nextprev" aria-label="Post navigation">
    <div class="ygb-nextprev-row">
        <div class="cell">
            {{ with .PrevInSection }}
            <a href="{{ .Permalink }}" class="prev">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"></path><path d="m12 19-7-7 7-7"></path></svg>
                <span><span class="np-kicker">{{ i18n "previous" | default "Previous" }}</span><span class="np-title">{{ .Title | markdownify }}</span></span>
            </a>
            {{ end }}
        </div>
        <div class="cell right">
            {{ with .NextInSection }}
            <a href="{{ .Permalink }}" class="next">
                <span style="text-align:right"><span class="np-kicker">{{ i18n "next" | default "Next" }}</span><span class="np-title">{{ .Title | markdownify }}</span></span>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
            </a>
            {{ end }}
        </div>
    </div>
</nav>
{{ end }}
